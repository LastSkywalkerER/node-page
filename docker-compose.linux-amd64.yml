# Linux amd64 for Dokploy / Traefik: do NOT use network_mode: host here — Dokploy injects
# `networks:` and Traefik labels; host + networks is invalid in Compose.
# Metrics still use /host, pid: host, ipc: host. Traefik → container:9090 (or file provider to host IP).
#   docker compose -f docker-compose.linux-amd64.yml --env-file .env up -d --build
services:
  node-stats:
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
    # network_mode: host
    volumes:
      - ./.env:/app/.env
      - ./data/docker:/app/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /:/host:ro
    pid: host
    ipc: host
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    environment:
      - ADDR=:9090
      
      - HOST_PROC=/host/proc
      - HOST_SYS=/host/sys
      - HOST_ETC=/host/etc
      - HOST_ROOT=/host
      - NODE_HOST_ALIAS=host.docker.internal
