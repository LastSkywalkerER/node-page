services:
  node-stats:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "9090:9090"
    # Note: network_mode: host is not fully supported on macOS Docker Desktop
    # Using port mapping instead. For Linux, you can uncomment network_mode: host
    # and comment out ports section for better host metrics access
    # network_mode: host
    volumes:
      # Agent cluster config: persists on the host across rebuilds (loaded as /app/.env in the container)
      - ./.env.agent:/app/.env
      # Mount database directory (file mount creates dir if missing → "is a directory" error)
      - ./data/docker:/app/data
      # Mount Docker socket for Docker metrics
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Mount host filesystem for system metrics
      - /:/host:ro
    # pid: host and ipc: host work better with network_mode: host
    # On macOS, these may have limited functionality
    pid: host
    ipc: host
    # host.docker.internal for NODE_HOST_ALIAS (Linux needs this; Mac/Win have it by default)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    environment:
      # Server configuration
      - ADDR=:9090
      - GIN_MODE=${GIN_MODE:-release}
      - DEBUG=${DEBUG:-false}
      # Database configuration
      - DB_TYPE=${DB_TYPE:-sqlite}
      - DB_DSN=/app/data/stats.db
      # Authentication configuration (required)
      - JWT_SECRET=${JWT_SECRET}
      - REFRESH_SECRET=${REFRESH_SECRET}
      # Host filesystem paths for system metrics
      - HOST_PROC=/host/proc
      - HOST_SYS=/host/sys
      - HOST_ETC=/host/etc
      # When connecting to main on host, replace localhost with host (macOS/Windows Docker)
      - NODE_HOST_ALIAS=host.docker.internal
      # MAIN_NODE_URL / NODE_ACCESS_TOKEN: use bind-mounted ./.env.agent → /app/.env (not Compose env, so values are not overridden by empty vars)
